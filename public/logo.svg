<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="55%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#1040cc"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40f0ff"/>
      <stop offset="100%" stop-color="#4080ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brain left lobe -->
  <path d="
    M32 10
    C26 10 18 13 16 19
    C12 19 9 22 9 27
    C9 32 12 36 16 37
    C17 41 19 44 23 46
    C25 47.5 27 48 29 48
    L32 48 L32 10 Z
  " fill="url(#brainGrad)" stroke="url(#strokeGrad)" stroke-width="0.8" opacity="0.95"/>

  <!-- Brain right lobe -->
  <path d="
    M32 10
    C38 10 46 13 48 19
    C52 19 55 22 55 27
    C55 32 52 36 48 37
    C47 41 45 44 41 46
    C39 47.5 37 48 35 48
    L32 48 L32 10 Z
  " fill="url(#brainGrad)" stroke="url(#strokeGrad)" stroke-width="0.8" opacity="0.95"/>

  <!-- Stem -->
  <rect x="29.5" y="48" width="5" height="6" rx="2.5" fill="url(#brainGrad)" opacity="0.7"/>

  <!-- Center divider -->
  <line x1="32" y1="11" x2="32" y2="48" stroke="#0050bb" stroke-width="1.2" opacity="0.4"/>

  <!-- Circuit lines LEFT -->
  <polyline points="22,21 22,28 17,28" stroke="#00d4ff" stroke-width="1.2" fill="none" opacity="0.85" filter="url(#glow)"/>
  <line x1="22" y1="28" x2="26" y2="38" stroke="#00d4ff" stroke-width="1.2" opacity="0.85" filter="url(#glow)"/>

  <!-- Circuit lines RIGHT -->
  <polyline points="42,23 42,30 47,30" stroke="#00d4ff" stroke-width="1.2" fill="none" opacity="0.85" filter="url(#glow)"/>
  <line x1="42" y1="30" x2="38" y2="40" stroke="#00d4ff" stroke-width="1.2" opacity="0.85" filter="url(#glow)"/>

  <!-- Circuit nodes LEFT -->
  <circle cx="22" cy="21" r="2.2" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="17" cy="28" r="1.8" fill="#40d0ff" filter="url(#glow)"/>
  <circle cx="26" cy="38" r="1.8" fill="#40d0ff" filter="url(#glow)"/>

  <!-- Circuit nodes RIGHT -->
  <circle cx="42" cy="23" r="2.2" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="47" cy="30" r="1.8" fill="#40d0ff" filter="url(#glow)"/>
  <circle cx="38" cy="40" r="1.8" fill="#40d0ff" filter="url(#glow)"/>

  <!-- > chevron white (centered) -->
  <path d="M27 27 L35 32 L27 37" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Sparkle star (top-center, brain junction) -->
  <g transform="translate(32,17)" filter="url(#sparkle)">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#ffffff" stroke-width="1"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#ffffff" stroke-width="1"/>
    <circle r="2" fill="white"/>
  </g>
</svg>
